<div id="testa">{{titolopagina}}</div>

<div id="form_di_accesso">

    <form #accesso="ngForm" (ngSubmit)="accedi(accesso)">
        <div class="form-group">
            <input name="username" #username="ngModel" required class="form-control" type="text"
                placeholder="chi sei?" ngModel>
        </div>
        <div *ngIf="username.touched && username.errors?.required">Inserisci il nome utente!</div>
        <div class="form-group">
            <input name="password" #password="ngModel" required class="form-control" type="password"
                placeholder="***" ngModel>
        </div>
        <div *ngIf="password.touched && password.errors?.required">Inserisci la password!</div>        
        <div>
            <button type="submit">Accedi</button>
            <span>
                <span><p>Ricorda questo accesso</p><input name="check" #check="ngModel" type="checkbox" ngModel></span>
                <span>Non sei iscritto? <a routerLink="/registrazione">Registrati</a></span>
            </span>
        </div>
        <div *ngIf="password.touched && !vabene">Credenziali non valide!</div>
    </form>
    
</div>
