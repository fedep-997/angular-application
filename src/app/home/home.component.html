<app-testa header="home" avatar=1></app-testa>

<div id="navigatore-superiore">
    <div><a (click)="esci()">Logout</a></div>
    <div>Welcome, {{accesso}}</div>
    <div><a routerLink="/nuovopost">Nuovo Post</a></div>
</div>

<!--Feed-->
<div *ngFor="let pb of pubblicazioni.slice().reverse(); let indice = index" [attr.data-index]="indice">
    <div id="riga_post">
        <div>
            <div class="titoletto" [routerLink]="['/post', pb.id]">
                <ngx-avatar [name]="pb.user"></ngx-avatar>
                <p>{{pb.titolo}}</p>
            </div>
            <br>
            {{pb.testo}}
        </div>
    </div>
</div>

<!--Paginazione feed-->
<ngb-pagination class="pg" [(page)]="page" [pageSize]="pageSize" [collectionSize]="pubblicazioni.length">
</ngb-pagination>
